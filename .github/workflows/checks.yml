name: checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -U pip
      - run: pip install -e .[dev]
      - run: python scripts/audit_public_release.py .
      - run: python scripts/check_pr_readiness.py
      - run: python scripts/run_replay_pipeline.py --evidence-dir artifacts/evidence --out-dir outputs/replay
      - run: pytest -q
